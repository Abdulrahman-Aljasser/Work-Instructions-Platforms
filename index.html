<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة تعليمات العمل — السجل العقاري</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────── */
:root{
  --navy:#1F3461;--navy-d:#16264A;--navy-s:#2C4478;
  --paper:#F4F6FA;--card:#fff;--line:#DFE5EF;--line-s:#EEF2F8;
  --ink:#26304A;--sub:#475569;--muted:#67738C;
  --green:#1B9D5B;--gbg:#E7F6EE;--gbr:#B8E8CF;
  --amber:#B97E0B;--abg:#FBF3E0;--abr:#E8CFA0;
  --red:#BB3A33;--rbg:#FBEAE8;--rbr:#F0C4C1;
  --blue:#2563EB;--bbg:#E9EEF9;--bbr:#C5D5EF;
  --r:12px;--rs:8px;--rl:18px;
  --sh:0 2px 12px rgba(31,52,97,.07);
  --shm:0 6px 24px rgba(31,52,97,.11);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{
  font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;
  background:var(--paper);color:var(--ink);
  direction:rtl;line-height:1.7;
  -webkit-font-smoothing:antialiased;min-height:100vh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── HEADER ─────────────────────────────────── */
.header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-d) 100%);
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(22,38,74,.3);
}
.header-inner{
  max-width:1240px;margin:0 auto;
  padding:.85rem 1.5rem;
  display:flex;align-items:center;gap:.85rem;
}
.hmark{
  width:40px;height:40px;border-radius:10px;
  background:linear-gradient(135deg,#2C4478,#16264A);
  display:grid;place-items:center;flex-shrink:0;
  border:1px solid rgba(255,255,255,.12);
}
.htitle{font-size:1rem;font-weight:600;color:#fff;line-height:1.3}
.hsub{font-size:.67rem;color:#ADBBDA;font-weight:300}
.hspace{flex:1}
.hbtn{
  color:#ADBBDA;padding:.4rem .5rem;border-radius:8px;
  transition:background .15s;font-size:.85rem;
  display:none;
}
.hbtn:hover{background:rgba(255,255,255,.1);color:#fff}

/* ── HERO ────────────────────────────────────── */
.hero{
  background:linear-gradient(180deg,var(--navy) 0%,var(--navy-d) 100%);
  padding:1.75rem 1.5rem 2.75rem;overflow:hidden;position:relative;
}
.hero::before{
  content:'';position:absolute;
  inset-inline-start:-60px;top:-40px;
  width:240px;height:240px;
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.06) 0 8px,transparent 9px) 0 0/34px 34px;
  opacity:.7;pointer-events:none;
}
.hero-wrap{max-width:780px;margin:0 auto;position:relative}
.hero-title{font-size:1.3rem;font-weight:600;color:#fff;margin-bottom:.25rem}
.hero-desc{font-size:.82rem;color:#B9C6E2;margin-bottom:1rem}
.searchbox{
  display:flex;background:#fff;border-radius:var(--r);
  overflow:hidden;box-shadow:0 10px 32px rgba(10,20,45,.35);
}
.searchbox input{
  flex:1;border:none;outline:none;
  padding:.9rem 1.1rem;font-family:inherit;
  font-size:.93rem;color:var(--ink);min-width:0;
}
.searchbox button{
  background:var(--green);color:#fff;
  padding:0 1.4rem;font-size:.88rem;font-weight:600;
  flex-shrink:0;transition:background .15s;
}
.searchbox button:hover{background:#178a4f}
.qtags{
  display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.75rem;align-items:center;
}
.qlbl{font-size:.72rem;color:#9FB0D2}
.qtag{
  font-size:.73rem;color:#E7EDF9;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.18);
  border-radius:999px;padding:.22rem .8rem;
  cursor:pointer;transition:background .15s;
}
.qtag:hover{background:rgba(255,255,255,.24)}

/* ── LAYOUT ──────────────────────────────────── */
.main{max-width:1240px;margin:-1.5rem auto 4rem;padding:0 1.5rem;position:relative}
.cols{display:grid;grid-template-columns:1fr 288px;gap:1.1rem;align-items:start}

/* ── FILTERS ─────────────────────────────────── */
.filters{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);padding:.8rem 1rem;
  display:flex;gap:.6rem;flex-wrap:wrap;align-items:flex-end;
  margin-bottom:.9rem;box-shadow:var(--sh);
}
.flbl{
  font-size:.72rem;color:var(--muted);
  display:flex;flex-direction:column;gap:.18rem;
  flex:1;min-width:110px;
}
.flbl select{
  font-family:inherit;font-size:.82rem;padding:.42rem .55rem;
  border:1px solid var(--line);border-radius:var(--rs);
  background:var(--paper);color:var(--ink);
  outline:none;cursor:pointer;transition:border-color .15s;
}
.flbl select:focus{border-color:var(--navy-s)}
.freset{
  font-size:.74rem;color:var(--navy);text-decoration:underline;
  align-self:flex-end;padding-bottom:.4rem;
}

/* ── SERVICE CARDS ───────────────────────────── */
.card-list{display:flex;flex-direction:column;gap:.8rem}
.scard{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);padding:1rem 1.1rem;
  cursor:pointer;box-shadow:var(--sh);
  transition:border-color .15s,transform .15s,box-shadow .15s;
  position:relative;overflow:hidden;
}
.scard::before{
  content:'';position:absolute;
  inset-inline-end:0;top:0;width:4px;height:100%;
  background:var(--accent,var(--navy));
}
.scard:hover{border-color:var(--accent,var(--navy));transform:translateY(-2px);box-shadow:var(--shm)}
.scard-top{display:flex;gap:.6rem;align-items:flex-start;margin-bottom:.35rem;flex-wrap:wrap}
.scard-icon{font-size:1.5rem;flex-shrink:0;line-height:1}
.scard-info{flex:1;min-width:0}
.scard-name{font-size:.97rem;font-weight:600;color:var(--navy)}
.scard-code{font-size:.68rem;color:var(--muted);font-family:monospace}
.scard-desc{
  font-size:.8rem;color:var(--muted);margin-bottom:.5rem;

 .scard-desc{
  font-size:.8rem;
  color:var(--muted);
  margin-bottom:.5rem;

  line-height:1.5;
  height:3em;
  overflow:hidden;
}
}
.scard-foot{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;font-size:.7rem;color:var(--muted)}
.scard-tags{display:flex;gap:.3rem;flex-wrap:wrap;flex:1}
.tag{font-size:.67rem;background:#F0F3F9;color:#4A5878;border-radius:999px;padding:.07rem .55rem}

/* ── BADGES ──────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;
  font-size:.68rem;font-weight:700;
  border-radius:999px;padding:.1rem .6rem;white-space:nowrap;
}
.b-active  {background:var(--gbg);color:var(--green)}
.b-updated {background:var(--bbg);color:var(--navy)}
.b-draft   {background:var(--abg);color:var(--amber)}
.b-cls-pub {background:var(--gbg);color:var(--green)}
.b-cls-res {background:var(--abg);color:var(--amber)}

/* ── DETAIL PAGE ─────────────────────────────── */
.detail{animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.back{
  display:inline-flex;align-items:center;gap:.35rem;
  font-size:.82rem;font-weight:600;color:var(--navy);
  margin-bottom:.85rem;padding:.3rem .6rem;
  border-radius:var(--rs);transition:background .15s;
}
.back:hover{background:var(--bbg)}

.dhead{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--rl);padding:1.4rem 1.5rem;
  position:relative;overflow:hidden;
  margin-bottom:1rem;box-shadow:var(--sh);
}
.dhead-bar{
  position:absolute;inset-inline-start:0;top:0;
  width:5px;height:100%;
}
.dhead-stamp{
  position:absolute;inset-inline-end:1.25rem;top:1.1rem;
  transform:rotate(-12deg);
  border:2.5px solid var(--green);color:var(--green);
  font-weight:700;font-size:.68rem;
  padding:.22rem .65rem;border-radius:8px;
  letter-spacing:.05em;background:rgba(231,246,238,.85);
}
.dhead-title{font-size:1.15rem;font-weight:700;color:var(--navy);margin:.45rem 0 .3rem}
.dhead-desc{font-size:.83rem;color:var(--muted);max-width:68ch;line-height:1.65;margin-bottom:.75rem}
.dhead-meta{display:flex;gap:.55rem;flex-wrap:wrap;align-items:center}
.chip{
  display:flex;align-items:center;gap:.28rem;
  font-size:.72rem;color:var(--muted);
  background:var(--paper);border:1px solid var(--line);
  border-radius:999px;padding:.15rem .6rem;
}
.chip strong{color:var(--ink)}

/* TABS */
.tabs{
  display:flex;gap:.3rem;overflow-x:auto;
  margin-bottom:.9rem;padding-bottom:2px;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  font-size:.78rem;padding:.48rem .95rem;
  border-radius:999px;background:var(--card);
  border:1px solid var(--line);color:var(--muted);
  white-space:nowrap;transition:all .15s;
}
.tab:hover{border-color:var(--navy-s);color:var(--navy)}
.tab.on{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:600}
.pane{display:none}
.pane.on{display:block}

/* SECTION */
.sec{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);margin-bottom:.75rem;
  overflow:hidden;box-shadow:var(--sh);
}
.sec-hd{
  width:100%;display:flex;align-items:center;
  justify-content:space-between;
  padding:.85rem 1rem;cursor:pointer;
  transition:background .15s;text-align:right;
}
.sec-hd:hover{background:var(--paper)}
.sec-title{font-size:.88rem;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:.45rem}
.sec-chev{color:var(--muted);font-size:.75rem;transition:transform .18s}
.sec.closed .sec-chev{transform:rotate(180deg)}
.sec-body{padding:.25rem 1rem 1rem;border-top:1px dashed var(--line-s)}
.sec.closed .sec-body{display:none}

/* STEPS */
.steps{display:flex;flex-direction:column;gap:.65rem;padding-top:.65rem}
.step{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);overflow:hidden;
}
.step-hd{
  width:100%;display:flex;align-items:center;
  gap:.65rem;padding:.72rem .9rem;
  cursor:pointer;text-align:right;transition:background .15s;
}
.step-hd:hover{background:var(--paper)}
.step-num{
  background:var(--navy);color:#fff;
  font-size:.7rem;font-weight:700;
  border-radius:7px;padding:.15rem .52rem;
  flex-shrink:0;font-variant-numeric:tabular-nums;
}
.step-title{flex:1;font-size:.87rem;font-weight:600;color:var(--ink)}
.step-who{font-size:.68rem;color:var(--muted);white-space:nowrap;flex-shrink:0}
.step-chev{color:var(--muted);font-size:.68rem;transition:transform .18s;flex-shrink:0}
.step.open .step-chev{transform:rotate(180deg)}
.step-body{display:none;padding:0 .9rem .85rem;border-top:1px dashed var(--line-s)}
.step.open .step-body{display:block}
.step-body ul{padding-inline-start:1.1rem;font-size:.8rem;margin-top:.55rem}
.step-body ul li{margin-bottom:.28rem;color:var(--ink);line-height:1.55}

/* LISTS */
.item-list{display:flex;flex-direction:column;gap:.45rem;padding-top:.65rem}
.row{
  display:flex;align-items:flex-start;gap:.65rem;
  padding:.65rem .85rem;border-radius:var(--rs);
  font-size:.82rem;line-height:1.55;
}
.row-doc{background:var(--paper);border:1px solid var(--line)}
.row-reject{background:var(--rbg);border:1px solid var(--rbr);color:#7a2420}
.row-suspend{background:var(--abg);border:1px solid var(--abr);color:#7a520a}
.row-rule{background:var(--bbg);border:1px solid var(--bbr);color:var(--ink)}
.row-req{background:var(--paper);border:1px solid var(--line)}
.row-code{font-family:monospace;font-weight:700;flex-shrink:0;min-width:34px}
.row-icon{flex-shrink:0;margin-top:.05rem}
.row-body{flex:1;min-width:0}
.row-name{font-weight:500;color:var(--ink)}
.row-note{font-size:.73rem;color:var(--muted);margin-top:.1rem}
.req-badge{
  font-size:.67rem;font-weight:700;
  border-radius:999px;padding:.1rem .5rem;flex-shrink:0;
}
.req-y{background:var(--rbg);color:var(--red)}
.req-n{background:var(--gbg);color:var(--green)}

/* NOTES */
.note{
  display:flex;align-items:flex-start;gap:.55rem;
  padding:.75rem .9rem;border-radius:var(--rs);
  font-size:.81rem;line-height:1.6;margin-top:.65rem;
}
.note-info{background:#EEF4FF;border:1px solid var(--bbr);color:#1e3a7a}
.note-warning{background:var(--abg);border:1px solid var(--abr);color:#7a520a}
.note-danger{background:var(--rbg);border:1px solid var(--rbr);color:#7a2420}

/* VERSIONS */
.vtbl-wrap{overflow-x:auto;margin-top:.65rem;border-radius:var(--r)}
.vtbl{width:100%;border-collapse:collapse;background:var(--card);font-size:.78rem}
.vtbl th{
  background:var(--navy);color:#fff;
  padding:.52rem .8rem;text-align:right;
  font-weight:600;font-size:.73rem;
}
.vtbl td{padding:.52rem .8rem;border-top:1px solid var(--line);vertical-align:top}
.vtbl tr:nth-child(even) td{background:#FAFBFD}
.vtbl tr.latest td{background:var(--gbg)!important;font-weight:600}

/* KEYWORDS */
.kwcloud{display:flex;flex-wrap:wrap;gap:.45rem;padding-top:.65rem}
.kwchip{
  font-size:.75rem;color:var(--navy);
  background:var(--bbg);border:1px solid var(--bbr);
  border-radius:999px;padding:.22rem .75rem;
  cursor:pointer;transition:all .15s;
}
.kwchip:hover{background:var(--navy);color:#fff}

/* CHECKLIST */
.checklist{display:flex;flex-direction:column;gap:.35rem;padding-top:.65rem}
.chk-group{font-size:.75rem;font-weight:700;color:var(--navy);margin-top:.6rem;margin-bottom:.1rem;display:flex;align-items:center;gap:.35rem}
.chk-item{
  display:flex;align-items:flex-start;gap:.55rem;
  font-size:.82rem;color:var(--ink);
  padding:.35rem .25rem;border-radius:var(--rs);
  cursor:pointer;transition:background .15s;line-height:1.5;
}
.chk-item:hover{background:var(--paper)}
.chk-item input{margin-top:.22rem;width:15px;height:15px;accent-color:var(--green);flex-shrink:0;cursor:pointer}
.chk-item.done{color:var(--muted);text-decoration:line-through}

/* MESSAGES TABLE */
.msg-tbl{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:.65rem}
.msg-tbl th{background:var(--navy);color:#fff;padding:.5rem .75rem;text-align:right;font-size:.73rem}
.msg-tbl td{padding:.5rem .75rem;border-top:1px solid var(--line);vertical-align:top}
.msg-tbl tr:nth-child(even) td{background:#FAFBFD}

/* SUMMARY */
.sum-list{display:flex;flex-direction:column;gap:.4rem;padding-top:.65rem}
.sum-row{
  display:flex;align-items:center;gap:.75rem;
  padding:.6rem .9rem;background:var(--paper);
  border:1px solid var(--line);border-radius:var(--rs);font-size:.83rem;
}
.sum-key{color:var(--muted);min-width:110px;font-size:.76rem;flex-shrink:0}
.sum-val{color:var(--ink);font-weight:500}

/* EMPTY / LOADING */
.empty{
  background:var(--card);border:1px dashed var(--line);
  border-radius:var(--r);padding:2.5rem;
  text-align:center;color:var(--muted);font-size:.88rem;
}
.loader{
  display:flex;align-items:center;justify-content:center;
  gap:.65rem;padding:2.5rem;color:var(--muted);font-size:.88rem;
}
.spin{
  width:20px;height:20px;
  border:2.5px solid var(--line);border-top-color:var(--navy);
  border-radius:50%;animation:sp .65s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}

/* SIDEBAR PANEL */
.panel{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);padding:1rem 1.05rem;
  margin-bottom:.9rem;box-shadow:var(--sh);
}
.panel-title{
  font-size:.84rem;font-weight:600;color:var(--navy);
  margin-bottom:.7rem;
  display:flex;align-items:center;gap:.45rem;
}
.pdot{width:8px;height:8px;border-radius:3px;background:var(--green);flex-shrink:0}
.upd-item{
  display:flex;gap:.5rem;align-items:flex-start;
  padding:.45rem 0;border-bottom:1px dashed var(--line);
  font-size:.78rem;cursor:pointer;
}
.upd-item:last-child{border-bottom:none;padding-bottom:0}
.upd-item:hover .upd-name{color:var(--navy)}
.upd-badge{font-size:.62rem;font-weight:600;border-radius:6px;padding:.05rem .45rem;flex-shrink:0;margin-top:.15rem}
.b-new{background:var(--gbg);color:var(--green)}
.b-upd{background:var(--bbg);color:var(--navy)}
.b-drf{background:var(--abg);color:var(--amber)}
.upd-body{flex:1;min-width:0}
.upd-name{font-weight:600;color:var(--ink);margin-bottom:.1rem}
.upd-sub{color:var(--muted);font-size:.74rem}
.upd-date{font-size:.68rem;color:#94a3b8;white-space:nowrap;flex-shrink:0;padding-top:.15rem}

/* STAT BAR */
.stat-row{display:flex;align-items:center;gap:.55rem;padding:.3rem 0;font-size:.78rem}
.stat-lbl{flex:1;color:var(--muted)}
.stat-track{width:80px;height:7px;background:var(--line);border-radius:99px;overflow:hidden}
.stat-fill{height:100%;background:linear-gradient(90deg,var(--navy-s),var(--navy));border-radius:99px}
.stat-val{font-variant-numeric:tabular-nums;color:var(--muted);font-size:.68rem;min-width:24px;text-align:left}

/* OVERLAY + MOBILE */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;backdrop-filter:blur(2px)}
.overlay.open{display:block}
.hidden{display:none!important}
mark{background:#FFE9A8;border-radius:3px;padding:0 .1em}

/* RESPONSIVE */
@media(max-width:960px){.cols{grid-template-columns:1fr}.side-col{order:-1}}
@media(max-width:640px){
  .hero{padding:1.4rem 1rem 2.4rem}
  .hero-title{font-size:1.1rem}
  .main{padding:0 .9rem}
  .filters{flex-direction:column;gap:.5rem}
  .flbl{min-width:unset}
  .hbtn{display:flex;align-items:center}
  .tabs{gap:.2rem}
  .tab{font-size:.74rem;padding:.4rem .75rem}
  .dhead{padding:1rem 1.1rem}
  .dhead-title{font-size:1rem}
}
@media print{
  .header,.hero,.filters,.tabs,.side-col,.back{display:none!important}
  .main{margin:0;padding:0}
  .cols{grid-template-columns:1fr}
  .pane{display:block!important}
  .sec.closed .sec-body{display:block!important}
  .step-body{display:block!important}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="hmark">
      <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
        <rect x="3" y="3" width="5" height="5" rx="1" fill="#7BD7A6"/>
        <rect x="10" y="3" width="5" height="5" rx="1" fill="#fff" opacity=".85"/>
        <rect x="3" y="10" width="5" height="5" rx="1" fill="#fff" opacity=".55"/>
        <rect x="10" y="10" width="11" height="5" rx="1" fill="#fff" opacity=".85"/>
        <rect x="3" y="17" width="12" height="4" rx="1" fill="#7BD7A6" opacity=".8"/>
      </svg>
    </div>
    <div><div class="htitle">منصة تعليمات العمل</div><div class="hsub">إدارة التصرفات العقارية — السجل العقاري</div></div>
    <div class="hspace"></div>
    <button class="hbtn" id="menuBtn">☰</button>
  </div>
</header>

<section class="hero">
  <div class="hero-wrap">
    <h2 class="hero-title">ابحث عن تعليمات العمل</h2>
    <p class="hero-desc">بحث ذكي في الخطوات والمستندات وأسباب الرفض والتعليق</p>
    <div class="searchbox">
      <input id="q" type="search" placeholder="مثال: محضر دمج، وكالة شرعية، فرز الوحدات..." autocomplete="off">
      <button onclick="doSearch()">بحث</button>
    </div>
    <div class="qtags" id="qtags"></div>
  </div>
</section>

<main class="main">
  <div class="cols">
    <div class="list-col">

      <!-- filters -->
      <div class="filters" id="filtersBar">
        <label class="flbl">الحالة
          <select id="fStatus" onchange="renderCards()">
            <option value="">الكل</option>
            <option value="active">سارية</option>
            <option value="updated">محدثة</option>
            <option value="draft">مسودة</option>
          </select>
        </label>
        <label class="flbl">التصنيف
          <select id="fClass" onchange="renderCards()">
            <option value="">الكل</option>
            <option value="عام">عام</option>
            <option value="مقيد">مقيد</option>
          </select>
        </label>
        <button class="freset" onclick="resetAll()">إعادة التعيين</button>
      </div>

      <!-- card list -->
      <div class="card-list" id="cardList">
        <div class="loader"><div class="spin"></div><span>جارٍ التحميل...</span></div>
      </div>

      <!-- detail -->
      <div id="detailView" class="hidden"></div>
    </div>

    <aside class="side-col">
      <div class="panel">
        <div class="panel-title"><span class="pdot"></span>آخر التحديثات</div>
        <div id="updList"></div>
      </div>
      <div class="panel">
        <div class="panel-title"><span class="pdot"></span>إحصائيات</div>
        <div id="statPanel"></div>
      </div>
    </aside>
  </div>
</main>

<div class="overlay hidden" id="overlay"></div>

<script>
/* ════════════════════════════════════════════
   CONFIG — أضف اسم كل ملف هنا
   ════════════════════════════════════════════ */
const FILES = [
  'merge.md',
  'split-plot.md',
  'split-units.md',
  're-split-units.md',
  'tasheer.md',
];

/* ════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════ */
const ST = { services: [], query: '', fStatus: '', fClass: '', current: null };

/* ════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════ */
async function init() {
  const results = await Promise.allSettled(FILES.map(loadMD));
  ST.services = results
    .filter(r => r.status === 'fulfilled' && r.value)
    .map(r => r.value);
  renderCards();
  renderSidebar();
  renderQuickTags();
  bindSearch();
}

/* ════════════════════════════════════════════
   LOAD & PARSE MARKDOWN
   ════════════════════════════════════════════ */
async function loadMD(path) {
  const res = await fetch(path + '?v=' + Date.now());
  if (!res.ok) throw new Error(path);
  return parseMD(await res.text(), path);
}

function parseMD(raw, path) {
  // Extract frontmatter
  const fmMatch = raw.match(/^---\n([\s\S]*?)\n---/);
  if (!fmMatch) return null;
  const fm = {};
  fmMatch[1].split('\n').forEach(line => {
    const [k, ...v] = line.split(':');
    if (k && v.length) fm[k.trim()] = v.join(':').trim();
  });

  const body = raw.slice(fmMatch[0].length).trim();
  const s = { ...fm, _raw: body, _path: path };

  // Parse sections
  s.description   = getSection(body, 'الوصف');
  s.keywords      = parseKeywords(getSection(body, 'الكلمات المفتاحية'));
  s.steps         = parseSteps(body);
  s.documents     = parseDocuments(getSection(body, 'المستندات المطلوبة'));
  s.requirements  = parseRequirements(getSection(body, 'متطلبات الموظف'));
  s.rejections    = parseIssues(getSection(body, 'أسباب الرفض'));
  s.suspensions   = parseIssues(getSection(body, 'أسباب التعليق'));
  s.notes         = parseNotes(getSection(body, 'ملاحظات مهمة'));
  s.versions      = parseVersions(getSection(body, 'سجل الإصدارات'));
  s.messages      = parseMessages(getSection(body, 'الرسائل المعتمدة'));
  s.rules         = parseLines(getSection(body, 'القواعد العامة'));
  s.returnMessages= parseMessages(getSection(body, 'الرسائل المعتمدة للإعادة'));

  return s;
}

function getSection(body, title) {
  const re = new RegExp(`## ${title}\\n([\\s\\S]*?)(?=\\n## |$)`);
  const m = body.match(re);
  return m ? m[1].trim() : '';
}

function parseKeywords(txt) {
  return txt.split('،').map(k => k.replace(/^[-*]\s*/, '').trim()).filter(Boolean);
}

function parseLines(txt) {
  return txt.split('\n').map(l => l.replace(/^[-*]\s*/, '').trim()).filter(Boolean);
}

function parseIssues(txt) {
  return txt.split('\n').map(l => l.trim()).filter(l => /^- /.test(l)).map(l => {
    const parts = l.slice(2).split(' | ');
    return { code: parts[0]?.trim() || '', text: parts[1]?.trim() || parts[0]?.trim() || '' };
  });
}

function parseDocuments(txt) {
  return txt.split('\n').filter(l => /^- /.test(l.trim())).map(l => {
    const parts = l.trim().slice(2).split(' | ');
    return {
      name:     parts[0]?.trim() || '',
      required: (parts[1]?.trim() || 'اختياري') === 'إلزامي',
      notes:    parts[2]?.trim() || '',
    };
  });
}

function parseRequirements(txt) {
  return txt.split('\n').filter(l => /^- /.test(l.trim())).map(l => {
    const parts = l.trim().slice(2).split(' | ');
    return {
      text:     parts[0]?.trim() || '',
      required: (parts[1]?.trim() || 'اختياري') === 'إلزامي',
      notes:    parts[2]?.trim() || '',
    };
  });
}

function parseNotes(txt) {
  return txt.split('\n').filter(l => /^- /.test(l.trim())).map(l => {
    const parts = l.trim().slice(2).split(' | ');
    return { type: parts[0]?.trim() || 'info', text: parts[1]?.trim() || '' };
  });
}

function parseVersions(txt) {
  return txt.split('\n').filter(l => /^- /.test(l.trim())).map(l => {
    const parts = l.trim().slice(2).split(' | ');
    return {
      num:      parts[0]?.trim() || '',
      date:     parts[1]?.trim() || '',
      changes:  parts[2]?.trim() || '',
      approver: parts[3]?.trim() || '',
    };
  });
}

function parseMessages(txt) {
  return txt.split('\n').filter(l => /^- /.test(l.trim())).map(l => {
    const parts = l.trim().slice(2).split(' | ');
    return { reason: parts[0]?.trim() || '', message: parts[1]?.trim() || '' };
  });
}

function parseSteps(body) {
  const steps = [];
  const re = /### ([\d.]+) \| (.+?) \| (.+?)\n([\s\S]*?)(?=\n### |\n## |$)/g;
  let m;
  while ((m = re.exec(body)) !== null) {
    const items = m[4].trim().split('\n')
      .filter(l => /^- /.test(l.trim()))
      .map(l => l.trim().slice(2).trim());
    steps.push({ num: m[1], title: m[2], who: m[3], items });
  }
  return steps;
}

/* ════════════════════════════════════════════
   SEARCH & FILTER
   ════════════════════════════════════════════ */
function norm(s) {
  return (s || '').toLowerCase()
    .replace(/[أإآ]/g,'ا').replace(/ة/g,'ه')
    .replace(/ى/g,'ي').replace(/[ًٌٍَُِّْ]/g,'');
}

function searchable(s) {
  return norm([
    s.name, s.nameShort, s.code, s.description,
    ...(s.keywords || []),
    ...(s.steps || []).flatMap(x => [x.title, x.who, ...x.items]),
    ...(s.documents || []).map(d => d.name + ' ' + d.notes),
    ...(s.requirements || []).map(r => r.text),
    ...(s.rejections || []).map(r => r.text),
    ...(s.suspensions || []).map(r => r.text),
    ...(s.notes || []).map(n => n.text),
    ...(s.rules || []),
  ].join(' '));
}

function hl(text, q) {
  if (!q) return esc(text);
  const n = norm(text), nq = norm(q);
  const i = n.indexOf(nq);
  if (i < 0) return esc(text);
  return esc(text.slice(0,i)) + '<mark>' + esc(text.slice(i,i+q.length)) + '</mark>' + esc(text.slice(i+q.length));
}

function esc(s) {
  return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function filtered() {
  const q  = norm(ST.query);
  const fs = ST.fStatus;
  const fc = ST.fClass;
  return ST.services.filter(s =>
    (!q  || searchable(s).includes(q)) &&
    (!fs || s.status === fs) &&
    (!fc || s.classification === fc)
  );
}

/* ════════════════════════════════════════════
   RENDER CARDS
   ════════════════════════════════════════════ */
function renderCards() {
  ST.fStatus = document.getElementById('fStatus').value;
  ST.fClass  = document.getElementById('fClass').value;
  closeDetail();
  const list = filtered();
  const el   = document.getElementById('cardList');

  if (!list.length) {
    el.innerHTML = `<div class="empty">لا توجد نتائج لـ <strong>«${esc(ST.query)}»</strong></div>`;
    return;
  }

  el.innerHTML = list.map(s => {
    const tags = (s.keywords || []).slice(0,4);
    const sc   = statusClass(s.status);
    const acc  = s.color || 'var(--navy)';
    return `
    <div class="scard" data-id="${esc(s.id)}" style="--accent:${acc}"
      onclick="openDetail('${esc(s.id)}')" tabindex="0"
      onkeydown="if(event.key==='Enter')openDetail('${esc(s.id)}')">
      <div class="scard-top">
        <span class="scard-icon">${s.icon||'📄'}</span>
        <div class="scard-info">
          <div class="scard-name">${hl(s.name||'', ST.query)}</div>
          <div class="scard-code">${esc(s.code)} · v${esc(s.version)}</div>
        </div>
        <span class="badge ${sc}">${statusLabel(s.status)}</span>
        <span class="badge ${s.classification==='مقيد'?'b-cls-res':'b-cls-pub'}">${esc(s.classification||'عام')}</span>
      </div>
      <div class="scard-desc">${hl(s.description||'', ST.query)}</div>
      <div class="scard-foot">
        <div class="scard-tags">${tags.map(t=>`<span class="tag">${hl(t,ST.query)}</span>`).join('')}</div>
        <span>📅 ${esc(s.lastUpdate)}</span>
        <span>${(s.steps||[]).length} خطوة</span>
      </div>
    </div>`;
  }).join('');
}

/* ════════════════════════════════════════════
   DETAIL
   ════════════════════════════════════════════ */
function openDetail(id) {
  const s = ST.services.find(x => x.id === id);
  if (!s) return;
  ST.current = id;
  document.getElementById('cardList').classList.add('hidden');
  document.getElementById('filtersBar').classList.add('hidden');
  const dv = document.getElementById('detailView');
  dv.classList.remove('hidden');
  dv.innerHTML = buildDetail(s);
  bindDetailEvents();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeDetail() {
  ST.current = null;
  document.getElementById('detailView').classList.add('hidden');
  document.getElementById('detailView').innerHTML = '';
  document.getElementById('cardList').classList.remove('hidden');
  document.getElementById('filtersBar').classList.remove('hidden');
}

function buildDetail(s) {
  const acc  = s.color || '#1F3461';
  const sc   = statusClass(s.status);
  const hasMsgs  = (s.messages||[]).length > 0 || (s.returnMessages||[]).length > 0;
  const hasRules = (s.rules||[]).length > 0;

  return `
  <button class="back" onclick="closeDetail()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
      <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    العودة
  </button>

  <!-- HEAD -->
  <div class="dhead">
    <div class="dhead-bar" style="background:${acc}"></div>
    ${s.status !== 'draft' ? '<span class="dhead-stamp">نسخة معتمدة</span>' : ''}
    <span class="badge ${sc}" style="display:inline-block;margin-bottom:.4rem">${statusLabel(s.status)} — الإصدار ${esc(s.version)}</span>
    <div class="dhead-title">${esc(s.name)}</div>
    <p class="dhead-desc">${esc(s.description)}</p>
    <div class="dhead-meta">
      <span class="chip">📋 <strong>${esc(s.code)}</strong></span>
      <span class="chip">📅 <strong>${esc(s.lastUpdate)}</strong></span>
      <span class="chip">🏢 <strong>${esc(s.department)}</strong></span>
      <span class="badge ${s.classification==='مقيد'?'b-cls-res':'b-cls-pub'}">${esc(s.classification||'عام')}</span>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab on" data-tab="steps">⚙️ الخطوات</button>
    <button class="tab" data-tab="docs">📎 المستندات</button>
    <button class="tab" data-tab="reject">🚫 الرفض والتعليق</button>
    <button class="tab" data-tab="checklist">✅ قائمة التحقق</button>
    ${hasRules || hasMsgs ? '<button class="tab" data-tab="rules">📌 القواعد والرسائل</button>' : ''}
    <button class="tab" data-tab="versions">📜 الإصدارات</button>
    <button class="tab" data-tab="keywords">🏷️ الكلمات المفتاحية</button>
  </div>

  <!-- STEPS -->
  <div class="pane on" data-panel="steps">
    ${buildSteps(s)}
    ${buildNotes(s.notes)}
  </div>

  <!-- DOCS -->
  <div class="pane" data-panel="docs">
    ${mkSec('📎 المستندات المطلوبة', buildDocs(s.documents))}
    ${mkSec('🎓 متطلبات الموظف', buildReqs(s.requirements))}
  </div>

  <!-- REJECT -->
  <div class="pane" data-panel="reject">
    ${mkSec('🚫 أسباب الرفض',   buildIssueList(s.rejections,  'reject'))}
    ${mkSec('⏸️ أسباب التعليق', buildIssueList(s.suspensions, 'suspend'))}
  </div>

  <!-- CHECKLIST -->
  <div class="pane" data-panel="checklist">
    ${mkSec('✅ قائمة التحقق', buildChecklist(s))}
  </div>

  <!-- RULES -->
  ${hasRules || hasMsgs ? `
  <div class="pane" data-panel="rules">
    ${hasRules ? mkSec('📋 القواعد العامة', buildRules(s.rules)) : ''}
    ${(s.messages||[]).length     ? mkSec('💬 رسائل الإعادة', buildMsgsTable(s.messages)) : ''}
    ${(s.returnMessages||[]).length ? mkSec('💬 الرسائل المعتمدة للإعادة', buildMsgsTable(s.returnMessages)) : ''}
  </div>` : ''}

  <!-- VERSIONS -->
  <div class="pane" data-panel="versions">
    ${mkSec('📜 سجل الإصدارات', buildVersions(s.versions))}
  </div>

  <!-- KEYWORDS -->
  <div class="pane" data-panel="keywords">
    ${mkSec('🏷️ الكلمات المفتاحية', buildKeywords(s.keywords, s.id))}
  </div>
  `;
}

/* ── section wrapper ── */
function mkSec(title, body, open = true) {
  return `
  <div class="sec ${open ? '' : 'closed'}">
    <button class="sec-hd">
      <span class="sec-title">${title}</span>
      <span class="sec-chev">▲</span>
    </button>
    <div class="sec-body">${body}</div>
  </div>`;
}

/* ── steps ── */
function buildSteps(s) {
  if (!(s.steps||[]).length) return '<p style="color:var(--muted);font-size:.83rem;padding:.5rem 0">لا توجد خطوات.</p>';
  return `<div class="steps">${s.steps.map((st, i) => `
  <div class="step ${i===0?'open':''}">
    <button class="step-hd">
      <span class="step-num">${esc(st.num)}</span>
      <span class="step-title">${esc(st.title)}</span>
      <span class="step-who">${esc(st.who)}</span>
      <span class="step-chev">▼</span>
    </button>
    <div class="step-body">
      ${st.items.length ? `<ul>${st.items.map(x => `<li>${esc(x)}</li>`).join('')}</ul>` : ''}
    </div>
  </div>`).join('')}</div>`;
}

/* ── docs ── */
function buildDocs(docs = []) {
  if (!docs.length) return '<p style="color:var(--muted);font-size:.83rem;padding:.5rem 0">لا توجد مستندات.</p>';
  return `<div class="item-list">${docs.map(d => `
  <div class="row row-doc">
    <span class="row-icon">📄</span>
    <div class="row-body">
      <div class="row-name">${esc(d.name)}</div>
      ${d.notes ? `<div class="row-note">${esc(d.notes)}</div>` : ''}
    </div>
    <span class="req-badge ${d.required?'req-y':'req-n'}">${d.required?'إلزامي':'اختياري'}</span>
  </div>`).join('')}</div>`;
}

/* ── requirements ── */
function buildReqs(reqs = []) {
  if (!reqs.length) return '<p style="color:var(--muted);font-size:.83rem;padding:.5rem 0">لا توجد متطلبات.</p>';
  return `<div class="item-list">${reqs.map(r => `
  <div class="row row-req">
    <span class="row-icon">${r.required?'✅':'○'}</span>
    <div class="row-body">
      <div class="row-name">${esc(r.text)}</div>
      ${r.notes ? `<div class="row-note">${esc(r.notes)}</div>` : ''}
    </div>
    <span class="req-badge ${r.required?'req-y':'req-n'}">${r.required?'إلزامي':'اختياري'}</span>
  </div>`).join('')}</div>`;
}

/* ── issues ── */
function buildIssueList(items = [], type) {
  if (!items.length) return `<p style="color:var(--muted);font-size:.83rem;padding:.5rem 0">لا توجد بنود.</p>`;
  return `<div class="item-list">${items.map(r => `
  <div class="row row-${type}">
    <span class="row-icon">${type==='reject'?'🚫':'⏸️'}</span>
    <span class="row-code">${esc(r.code)}</span>
    <span>${esc(r.text)}</span>
  </div>`).join('')}</div>`;
}

/* ── notes ── */
function buildNotes(notes = []) {
  if (!notes.length) return '';
  return notes.map(n => `
  <div class="note note-${n.type||'info'}" style="margin-top:.75rem">
    <span>${{info:'ℹ️',warning:'⚠️',danger:'🚨'}[n.type]||'ℹ️'}</span>
    <span>${esc(n.text)}</span>
  </div>`).join('');
}

/* ── checklist ── */
function buildChecklist(s) {
  const parts = [];
  if ((s.requirements||[]).length) {
    parts.push('<div class="chk-group">🎓 متطلبات الموظف</div>');
    s.requirements.forEach(r => parts.push(`
    <label class="chk-item">
      <input type="checkbox" onchange="this.closest('.chk-item').classList.toggle('done',this.checked)">
      <span>${esc(r.text)}</span>
    </label>`));
  }
  const reqDocs = (s.documents||[]).filter(d => d.required);
  if (reqDocs.length) {
    parts.push('<div class="chk-group" style="margin-top:.6rem">📎 المستندات الإلزامية</div>');
    reqDocs.forEach(d => parts.push(`
    <label class="chk-item">
      <input type="checkbox" onchange="this.closest('.chk-item').classList.toggle('done',this.checked)">
      <span>${esc(d.name)}</span>
    </label>`));
  }
  if ((s.steps||[]).length) {
    parts.push('<div class="chk-group" style="margin-top:.6rem">⚙️ خطوات المعالجة</div>');
    s.steps.forEach(st => parts.push(`
    <label class="chk-item">
      <input type="checkbox" onchange="this.closest('.chk-item').classList.toggle('done',this.checked)">
      <span>${esc(st.title)} <small style="color:var(--muted)">— ${esc(st.who)}</small></span>
    </label>`));
  }
  return `<div class="checklist">${parts.join('')}</div>`;
}

/* ── rules ── */
function buildRules(rules = []) {
  return `<div class="item-list">${rules.map(r => `
  <div class="row row-rule"><span class="row-icon">◆</span><span>${esc(r)}</span></div>`).join('')}</div>`;
}

/* ── messages ── */
function buildMsgsTable(msgs = []) {
  if (!msgs.length) return '';
  return `<table class="msg-tbl">
  <thead><tr><th>سبب الإعادة</th><th>الرسالة المعتمدة</th></tr></thead>
  <tbody>${msgs.map(m => `<tr><td>${esc(m.reason)}</td><td>${esc(m.message)}</td></tr>`).join('')}</tbody>
  </table>`;
}

/* ── versions ── */
function buildVersions(versions = []) {
  if (!versions.length) return '<p style="color:var(--muted);font-size:.83rem;padding:.5rem 0">لا يوجد سجل.</p>';
  return `<div class="vtbl-wrap"><table class="vtbl">
  <thead><tr><th>الإصدار</th><th>التاريخ</th><th>وصف التغييرات</th><th>المعتمد</th></tr></thead>
  <tbody>${versions.map((v,i) => `
  <tr class="${i===0?'latest':''}">
    <td style="font-family:monospace;font-weight:700;color:var(--navy)">v${esc(v.num)}${i===0?' ★':''}</td>
    <td style="white-space:nowrap">${esc(v.date)}</td>
    <td>${esc(v.changes)}</td>
    <td style="white-space:nowrap">${esc(v.approver)}</td>
  </tr>`).join('')}</tbody>
  </table></div>`;
}

/* ── keywords ── */
function buildKeywords(kws = [], id) {
  if (!kws.length) return '<p style="color:var(--muted);font-size:.83rem;padding:.5rem 0">لا توجد كلمات مفتاحية.</p>';
  return `<div class="kwcloud">${kws.map(k =>
    `<button class="kwchip" onclick="kwSearch('${esc(k)}')">${esc(k)}</button>`
  ).join('')}</div>`;
}

function kwSearch(k) {
  closeDetail();
  ST.query = k;
  document.getElementById('q').value = k;
  renderCards();
}

/* ════════════════════════════════════════════
   SIDEBAR
   ════════════════════════════════════════════ */
function renderSidebar() {
  // Updates
  const sorted = [...ST.services].sort((a,b) => parseDt(b.lastUpdate) - parseDt(a.lastUpdate));
  const bc = { active:'b-new', updated:'b-upd', draft:'b-drf' };
  document.getElementById('updList').innerHTML = sorted.map(s => `
  <div class="upd-item" onclick="openDetail('${esc(s.id)}')">
    <span class="upd-badge ${bc[s.status]||'b-upd'}">${statusLabel(s.status)}</span>
    <div class="upd-body">
      <div class="upd-name">${esc(s.nameShort||s.name)}</div>
      <div class="upd-sub">v${esc(s.version)} — ${esc(s.code)}</div>
    </div>
    <span class="upd-date">${esc(s.lastUpdate)}</span>
  </div>`).join('');

  // Stats
  const total = ST.services.length;
  const stats = [
    { l:'إجمالي الخدمات', v:total,                                            p:100 },
    { l:'محدثة',          v:ST.services.filter(s=>s.status==='updated').length, p:0 },
    { l:'سارية',          v:ST.services.filter(s=>s.status==='active').length,  p:0 },
    { l:'مسودات',         v:ST.services.filter(s=>s.status==='draft').length,   p:0 },
  ];
  stats.slice(1).forEach(x => { x.p = total ? Math.round(x.v/total*100) : 0 });
  document.getElementById('statPanel').innerHTML = stats.map(x => `
  <div class="stat-row">
    <span class="stat-lbl">${x.l}</span>
    <div class="stat-track"><div class="stat-fill" style="width:${x.p}%"></div></div>
    <span class="stat-val">${x.v}</span>
  </div>`).join('');
}

/* ════════════════════════════════════════════
   QUICK TAGS
   ════════════════════════════════════════════ */
function renderQuickTags() {
  const pool = [...new Set(ST.services.flatMap(s => s.keywords||[]))].slice(0,8);
  document.getElementById('qtags').innerHTML =
    '<span class="qlbl">بحث سريع:</span>' +
    pool.map(t => `<button class="qtag" onclick="quickSearch('${esc(t)}')">${esc(t)}</button>`).join('');
}
function quickSearch(t) { document.getElementById('q').value = t; ST.query = t; renderCards(); }

/* ════════════════════════════════════════════
   SEARCH
   ════════════════════════════════════════════ */
function bindSearch() {
  const inp = document.getElementById('q');
  let timer;
  inp.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => { ST.query = inp.value.trim(); renderCards(); }, 200);
  });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
}
function doSearch() { ST.query = document.getElementById('q').value.trim(); renderCards(); }
function resetAll() {
  ST.query = ''; ST.fStatus = ''; ST.fClass = '';
  document.getElementById('q').value = '';
  document.getElementById('fStatus').value = '';
  document.getElementById('fClass').value = '';
  renderCards();
}

/* ════════════════════════════════════════════
   DETAIL EVENTS
   ════════════════════════════════════════════ */
function bindDetailEvents() {
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
      document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
      btn.classList.add('on');
      const p = document.querySelector(`[data-panel="${btn.dataset.tab}"]`);
      if (p) p.classList.add('on');
    });
  });
  document.querySelectorAll('.sec-hd').forEach(h => {
    h.addEventListener('click', () => h.closest('.sec').classList.toggle('closed'));
  });
  document.querySelectorAll('.step-hd').forEach(h => {
    h.addEventListener('click', () => h.closest('.step').classList.toggle('open'));
  });
}

/* ════════════════════════════════════════════
   HELPERS
   ════════════════════════════════════════════ */
function statusLabel(s) { return {active:'سارية',updated:'محدثة',draft:'مسودة',archived:'مؤرشفة'}[s]||s }
function statusClass(s) { return {active:'b-active',updated:'b-updated',draft:'b-draft'}[s]||'b-active' }
function parseDt(d='') { const p=d.split('/'); return p.length===3?new Date(+p[2],+p[1]-1,+p[0]):new Date(0) }

/* ════════════════════════════════════════════
   START
   ════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', init);
</script>
